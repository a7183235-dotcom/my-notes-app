<!DOCTYPE html>
<html>
<head>
    <title>My Notes</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; }
        nav { background: #333; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 10px; }
        .container { max-width: 800px; margin: 30px auto; background: white; padding: 20px; border-radius: 8px; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-warning { background: #ffc107; color: black; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <nav>
        <span>My Notes</span>
        <div>
            {% if session.username %}
                {% if session.role == 'admin' %}
                    <a href="/admin">Admin Panel</a>
                {% endif %}
                <a href="/logout">Logout</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
