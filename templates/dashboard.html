{% extends 'base.html' %}
{% block content %}
<h2>My Notes</h2>
<form method="POST">
<textarea name="content" placeholder="Write your note here..." rows="3" style="width:100%; padding:10px; border-radius:4px; border:1px solid #ddd;"></textarea><br><br>
<button type="submit" class="btn btn-primary">Add Note</button>
</form>
<hr>
<h3>My Notes</h3>
{% for note in notes %}
<div style="background:#f9f9f9; padding:10px; margin:10px 0; border-radius:4px; display:flex; justify-content:space-between; align-items:center;">
    <span>{{ note.content }}</span>
    <div>
        <a href="/edit/{{ note.id }}"><button class="btn btn-warning">Edit</button></a>
        <a href="/delete/{{ note.id }}"><button class="btn btn-danger">Delete</button></a>
    </div>
</div>
{% endfor %}
{% endblock %}
